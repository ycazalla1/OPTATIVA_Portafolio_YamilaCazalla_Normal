<section class="quest-board-academy-card">
  <div id="pages">
    <div class="page">
      @if (videos && videos.length > 0) {
        <h2>{{videos[0].title}}</h2>
        <iframe
        [src]="getSafeUrl(videos[0].urlId)"
        frameborder="0"
        width="350"
        height="315"
        frameborder="0"
        allowfullscreen></iframe>
      }
    </div>
    <div class="page">
      @if (videos && videos.length > 1) {
        <h2>{{videos[1].title}}</h2>
        <iframe
        [src]="getSafeUrl(videos[1].urlId)"
        frameborder="0"
        width="350"
        height="315"
        frameborder="0"
        allowfullscreen></iframe>
      }
    </div>
  </div>
</section>
